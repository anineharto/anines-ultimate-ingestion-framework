kind: ExtractAndLoadConfig
metadata:
  name: source_a_dataset_b
  description: Extract and load config for source a dataset b
spec:
  common:
    source: source_a
    dataset: dataset_b
  extract:
    kind: SqlExtractConfig
    metadata:
      name: source_a_dataset_b
      description: Extract config for source a dataset b
    spec:
      server: "{{ source_a.dataset_b.server }}"
      database: database_a
      table: table_b
      query: SELECT * FROM table_b