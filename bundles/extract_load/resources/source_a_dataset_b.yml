resources:
  jobs:
    source_a_dataset_b_job:
      name: 'source_a: dataset_b'

      parameters:
        - name: branch_name
          default: main
        - name: current_batch_timestamp
          default: "2026-03-16T12:00:00.000000Z"
        - name: last_batch_timestamp
          default: "1970-01-01T00:00:00.123456Z"

      tasks:
        - task_key: extract_and_load_source_a_dataset_b
          existing_cluster_id: ${var.cluster_id}
          notebook_task:
            notebook_path: ../src/parametrized/extraction.py
            base_parameters:
              extract_load_config_name: el.source_a_dataset_b.json
